[build]
builder = "NIXPACKS"
buildCommand = "pip install -r transitops-backend/requirements.txt"

[deploy]
startCommand = "cd transitops-backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
