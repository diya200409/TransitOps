services:
  # Backend API
  - type: web
    name: transitops-api
    env: python
    region: oregon
    plan: free
    buildCommand: "cd transitops-backend && pip install -r requirements.txt"
    startCommand: "cd transitops-backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: TRANSITOPS_SECRET_KEY
        generateValue: true
      - key: TRANSITOPS_CORS_ORIGINS
        value: https://transitops.vercel.app,http://localhost:5173,http://localhost:5174
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  # PostgreSQL Database
  - name: transitops-db
    databaseName: transitops
    plan: free
    region: oregon
